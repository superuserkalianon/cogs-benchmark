overlooked_patterns:

  - id: "GWT_COMPETITION"
    source: "ChikamsoDev/AGI_GWT (4 .py, 9KB)"
    pattern: "Priority-Queue + Decay-basierte Competition → Broadcast"
    mechanism: |
      heapq.heappush(queue, (-priority, counter, message))
      effective = max(0.0, priority - decay_rate * age)
      winner = heapq.heappop(queue)
      broadcast(winner) an alle Subscriber
    integration_point: "CORTEX Live Loop → ersetze fixe poll_interval mit Competition"
    impact: "Dynamisches Attention-Routing statt statischem Polling"
    effort: "2h — GWT als CORTEX-Modul (31) einbauen"

  - id: "TURIYA_JUDGE"
    source: "QuintessenceCoding/Turiya (48 .py, 145KB)"
    pattern: "Confidence-weighted Truth Arbitration"
    mechanism: |
      if new_conf > old_conf: reinforce(old, -0.2)  # bestrafe alte Fakten
      elif old_conf > 0.8 and new_conf < 0.4: reject  # schütze Hoch-Konfidenz
    integration_point: "CORTEX Gate → ersetze binären Gate mit Konfidenz-Gewichtung"
    impact: "Selbstmessung der eigenen Wissens-Integrität"
    effort: "3h — Judge als CognitiveOp XXXIV"

  - id: "DRIFT_MONITOR"
    source: "Maoster101/Primes-Shadow-V1CL (75 .py)"
    pattern: "Rolling Window Drift Detection (affect + volatility + rigor)"
    mechanism: |
      composite = affect*α + volatility*β + rigor_drop*γ
      adaptive_baseline aus session_duration_history
      threshold_check → ALERT wenn composite > threshold
    integration_point: "CORTEX HealthWatchdog → ersetze statische Thresholds"
    impact: "Selbstmessung der eigenen Wissens-Degradation"
    effort: "2h — DriftMonitor in Watchdog integrieren"

  - id: "SELF_EVOLVING_META"
    source: "taojio/agi-agent (258 .py, 2.9MB)"
    pattern: "Metacognition Loop + Self-Model + Architecture Mutation"
    mechanism: |
      self.self_model.update_identity(features)
      metacognition = {entropy, confidence, kl_shift, novelty}
      if novelty > threshold: mutate_architecture()
    integration_point: "CORTEX Self-Improve → aktiviere autonomous architecture mutation"
    impact: "Rekursive Selbstverbesserung (bisher deaktiviert)"
    effort: "8h — SelfEvolvingAGI in CORTEX Op XXXV+XXXVI"

  - id: "NOVA_EVENT_SOURCING"
    source: "saravanaspar/nova-research (104 .py)"
    pattern: "Event-Sourced Cognitive Runtime"
    mechanism: |
      append-only event log → snapshot → replay
      cognition/attention.py: salience-weighted focus
    integration_point: "CORTEX Memory → Event Sourcing statt SQLite-only"
    impact: "Reproduzierbare Kognitions-Historie"
    effort: "5h — EventStore als Memory-Backend"

  - id: "COGNIARC_DRIVES"
    source: "zedarvates/cogniarc (137 .py)"
    pattern: "6 Human-Like Drives + 10 Reasoning Modes + 20 Simulations"
    mechanism: |
      curiosity_drive, novelty_drive, coherence_drive, efficiency_drive,
      safety_drive, exploration_drive → action_selection
    integration_point: "CORTEX Action Selection → ersetze Historical Council"
    impact: "Biologisch inspirierte Aktions-Selektion"
    effort: "6h — Drive-System als CognitiveOp XXXVII"

