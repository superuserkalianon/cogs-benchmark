# II. COGS DIMENSIONEN — IMPLEMENTIERUNGSSPEZIFIKATION
# ═══════════════════════════════════════════════════════

cogs_dimensions:

  CDTD:
    name: "Cross-Domain Transfer Distance"
    weight: 0.30
    current: 0.35
    target: 0.60
    implementation: |
      Für jedes Domain-Paar (d1,d2):
        cosine_sim(concept_vector(d1), concept_vector(d2)) × entropy_preservation
      Aggregiere über alle Domain-Paare
    improvement_path:
      - "360 Brückentexte als Trainingsdaten einbinden → +0.15"
      - "Genesis V2 27-Domain-Matrix nutzen → +0.05"
      - "Cross-Language (DE→FR→IT) Mappings → +0.05"

  CNI:
    name: "Compositional Novelty Index"
    weight: 0.25
    current: 0.02
    target: 0.15
    implementation: |
      Für jedes Text-Paar: deviation vom Durchschnitts-Vektor
      Gewichtet mit Entropie → Normalisiert auf [0,1]
    improvement_path:
      - "Stability Gate: nur Bridges die N Zyklen überleben → +0.05"
      - "33 Omega-Kreationen als Ground Truth → +0.03"
      - "6 Repo-Algorithmen als Novelty-Quellen → +0.05"

  IMA:
    name: "Isomorphic Mapping Accuracy"
    weight: 0.25
    current: 0.03
    target: 0.50
    implementation: |
      Für jedes Mapping (c1↔c2): Pearson-Korrelation über Texte
      Aggregiere |corr| über alle Mappings
    improvement_path:
      - "15 Isomorphien mit empirischen Tests validieren → +0.10"
      - "NTE Datalog (477 Fakten, 56 Regeln) als Ground Truth → +0.10"
      - "200-Jahre-Präfiguration (Stahl→Shannon) als Validierung → +0.05"

  EPR:
    name: "Entropy Preservation Ratio"
    weight: 0.20
    current: 0.88
    target: 0.95
    implementation: |
      Durchschnittliche Shannon-Entropie / 5.0 (Max für natürliche Sprache)
    improvement_path:
      - "OCR-Qualität verbessern (Fraktur-Normalizer) → +0.03"
      - "Größere Text-Ausschnitte (500K statt 50K chars) → +0.04"

