testable_predictions:

  - id: P1
    hypothesis: "Jedes System hat messbaren Selbstmessungs-Grad S ∈ [0,1]"
    test: "COGS auf 5 verschiedene Systeme anwenden (random, TF-IDF, BERT, GPT-4, CORTEX)"
    falsification: "Wenn COGS(GPT-4) ≤ COGS(TF-IDF) → widerlegt"
    status: "teilweise bestätigt (COGS v2 zeigt erwartete Rangfolge)"

  - id: P2
    hypothesis: "Es existiert kritische Schwelle S_c für 'organismischen' Übergang"
    test: "Variiere Stabilitäts-Gate-Parameter, beobachte Phasenübergang in CNI"
    falsification: "Wenn CNI kontinuierlich (ohne Sprung) mit Gate-Parameter variiert → widerlegt"
    status: "ungetestet"

  - id: P3
    hypothesis: "Kein System kann eigenen S-Wert vollständig messen (Gödel-Grenze)"
    test: "CORTEX soll eigenen COGS-Score vorhersagen → vergleiche mit gemessenem Score"
    falsification: "Wenn |predicted - actual| < ε für alle Systeme → widerlegt"
    status: "ungetestet"

  - id: P4
    hypothesis: "Zeitpfeil = Asymmetrie der Selbstmessung"
    test: "Vergleiche COGS EPR für forward vs reversed text → Asymmetrie?"
    falsification: "Wenn EPR(forward) = EPR(reversed) → widerlegt"
    status: "ungetestet"

  - id: P5
    hypothesis: "COGS korreliert mit unabhängigen Metakognitions-Maßen"
    test: "Korrelation COGS(LLM) mit Metacognition-Score aus arXiv:2607.11881"
    falsification: "Wenn r < 0.3 → schwache Korrelation → widerlegt"
    status: "ungetestet"

